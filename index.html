<!DOCTYPE html>
<!doctype html>
<html>
<head>
<title>Abilities VFX SFX</title>
</head>
<body bgcolor="#c8c8c8">
<script>
const abilities = [{"title": "AirborneObelisk", "description": "A large obelisk spawns high in the sky with a random offset from the player. It falls with eased gravity, becoming visible halfway down. On ground impact, it deals damage and upward knockback to enemies within an impact radius, then digs into the ground and fades out.", "vfx": "Obelisk Model Spawn High, Fall With Eased Gravity, Visibility Toggle Mid-Fall, Ground Impact VFX, Upward Knockback Visual, Dig-In/Fade", "sfx": "Distant stone-summon rumble, rising wind rush as it falls, heavy ground-crack impact, short debris burst, low grinding stone fade as it digs in and disappears."}, {"title": "BladeFlurry", "description": "The player performs multiple forward-moving slash segments with randomization in timing and positioning. Each segment moves forward dealing damage to enemies in its path, with a brief delay between segments. The ability ends after all slash segments are completed.", "vfx": "Multiple Slash VFX Clones, Forward Movement Tweens, Randomized Position/Time, Slash Particle Per Segment, Destroy Per Segment", "sfx": "Rapid layered blade swishes, slightly varied pitch per slash, quick air-cut transients, small impact ticks on hits, final sharper flourish when the flurry ends."}, {"title": "BladeWall", "description": "Multiple blades spawn in front of the player and fan outward in a 30-degree spread angle pattern. Each blade moves forward in its outward-facing direction, dealing damage to enemies it contacts. Blades travel until they hit an enemy or reach their max lifetime.", "vfx": "Blade Models, Fan Spawn Pattern, 30-Degree Spread, Forward Movement, Contact/Max Lifetime Destroy", "sfx": "Metallic blade materialize chime, synchronized fan-out whoosh, individual spinning steel whistles, sharp hit clangs, faint dissolving shimmer when blades expire."}, {"title": "Boulder", "description": "The player charges and summons a floating boulder that hovers above, following the mouse. Small rocks rise from the ground and assemble into it. On release, the boulder drops, crashes into the ground, and sinks away, dealing damage on impact.", "vfx": "Model Spawn, Hover Animation, Assembly Particles, Drop Animation, Impact Crater, Sink/Disappear", "sfx": "Pebbles rattling upward during assembly, deep suspended stone hum while hovering, falling rock rush, massive crash impact, gravel settling and muffled sink-out scrape."}, {"title": "ChainLightning", "description": "Lightning fires from the player toward the first enemy hit by a raycast toward the mouse. It then chains to the nearest unhit enemy within a radius, creating visual beams between targets. Each chain deals decreasing damage. Beams fade after a short duration.", "vfx": "Lightning Beam Visuals, Chain Connection Beams, Beam Fade Out", "sfx": "Instant electric crack from caster, snapping chain zaps between targets with descending intensity, buzzing arc sustain, quick static fizzle as beams fade."}, {"title": "ChargedManaBlast", "description": "An orb spawns above the player and grows as they charge. On release, it launches forward at high speed toward the mouse. On impact, it explodes dealing area damage with explosion VFX and ground impact effects.", "vfx": "Orb Model, Growth Tween, Launch Trail, Explosion Burst, Ground Impact Decal", "sfx": "Growing magical charge hum, layered energy build-up, forceful launch thump, fast projectile trail hiss, large mana explosion with sparkling after-ring."}, {"title": "DarkDaggers", "description": "Multiple dark daggers are thrown toward the mouse with slight dispersion and a falling arc after 0.5 seconds. Each dagger raycasts for enemy hits, embeds into the target on contact, deals damage, and applies bleed. Daggers fade out after 6 seconds.", "vfx": "Dagger Models, Thrown With Dispersion, Falling Arc, Embed Visual, Fade Out", "sfx": "Dry shadowy throw flicks, multiple thin dagger whistles, muted flesh/wood/stone embed impacts, faint dark pulse on bleed, slow whispery fade-out."}, {"title": "EarthSpikes", "description": "Rows of earth spikes burst from the ground in a line in front of the player, with increasing then decreasing counts per row. Each spike matches the ground material and color, deals damage to enemies in its area, then sinks back and is destroyed after a lifetime.", "vfx": "Spike Models, Row Burst From Ground, Material/Color Match, Sink Animation, Destroy", "sfx": "Sequential ground ruptures, rocky cracks per spike row, dirt burst impacts, short enemy hit thuds, reverse gravel scrape as spikes sink back down."}, {"title": "EarthWall", "description": "A wall of earth rises from the ground in front of the player, matching the terrain material and color. It damages and knocks back nearby enemies on emergence, then slowly loses health over time until it crumbles and is destroyed.", "vfx": "Wall Model, Rise From Ground, Material/Color Match, Crumble/Disappear", "sfx": "Low earth lift rumble, stone slabs grinding upward, brief knockback thud on emergence, slow cracking deterioration, final crumble with falling debris."}, {"title": "EnergyRicochet", "description": "A projectile spawns at the player and first bounces toward the mouse location, then ricochets to the nearest enemy. It continues bouncing between enemies up to a maximum number of times, dealing damage on each bounce. Max 10-second lifetime.", "vfx": "Projectile Model, Bounce Trail, Bounce Flash, Fade Out", "sfx": "Bright energy launch pop, elastic ricochet pings, quick flash zaps on each bounce, rising pitch for chained hits, soft power-down fade at the end."}, {"title": "Fireball", "description": "A fireball launches in an arc toward the mouse, playing a flying sound as it travels. On impact, it explodes dealing area damage, then spawns a growing fire patch on the ground that burns enemies over time before fading.", "vfx": "Fireball Model, Arc Trajectory, Explosion Burst, Fire Patch Ground Decal, Patch Growth/Fade", "sfx": "Ignition burst on cast, looping flame flight whoosh, heavy fiery explosion, ground fire crackle while patch burns, fading ember hiss."}, {"title": "FlameOrbit", "description": "Multiple fireball orbs fade in around the player at random positions and begin spinning with accelerating speed. On release, all orbs launch outward in their current direction and explode on enemy contact or at max distance. Orbs can also explode on touch while orbiting.", "vfx": "Fireball Orb Models, Staggered Fade In, Orbit Rotation With Acceleration, Outward Launch, Explosion Burst", "sfx": "Staggered flame ignition pops, circular fire whoosh that speeds up, release burst with multiple launch streaks, individual small explosions on contact or max range."}, {"title": "ForceField", "description": "A protective energy bubble expands around the player from nothing to full size. It remains active for a duration, then shrinks back down and disappears. No absorb/impact sounds are currently implemented but could be added for damage absorption.", "vfx": "Bubble/Sphere Model, Expand Tween, Idle Shimmer, Shrink Tween, Disappear", "sfx": "Soft protective energy bloom, glassy shield expansion tone, low shimmering idle loop, optional dull absorption bumps, gentle collapse tone when shrinking away."}, {"title": "FrostShatter", "description": "An ice projectile fires toward the mouse at double speed. On hit, it deals damage and welds to the surface. It then spawns multiple shards in a cone pattern that fly forward with gravity, each dealing shard damage on contact. Main projectile and shards fade out after their lifetimes.", "vfx": "Ice Projectile Model, Flight Trail, Surface Weld Visual, Cone Shard Spawn, Shard Gravity Flight, Fade Out", "sfx": "Cold launch snap, icy projectile whistle, hard frozen impact, glass-like shatter burst into shards, small crystal ticks as shards hit and fade."}, {"title": "GleamMinions", "description": "Three minions rise from the ground with staggered delays near the player. They pathfind to assigned enemies and attack when in range, dealing damage per hit. Minions have their own health and can die. When the player dies or all minions die, they are killed and destroyed.", "vfx": "Three Minion Models, Staggered Rise From Ground, Pathfinding Movement, Attack Animation, Death/Despawn", "sfx": "Three staggered summon chimes, tiny footstep or hover loops, bright attack chirps, small hit sparks, fading spirit pop when each minion dies or despawns."}, {"title": "GroundOrbit", "description": "Six ground pieces rise from the ground with staggered delays and begin orbiting around the player. Each piece continuously checks for enemy contact, dealing damage and briefly sticking enemies. Applies slowness to the caster. Lasts for its max lifetime.", "vfx": "Six Ground Piece Models, Staggered Rise, Orbit Rotation, Contact Flash", "sfx": "Six staggered rock lift cracks, circular grinding orbit loop, heavy stone air-swish, blunt contact thuds with flash accents, scattered rubble collapse on end."}, {"title": "GroundStomp", "description": "The player is slowed briefly during a wind-up, then stomps the ground. VFX is positioned at the ground impact point, particles are emitted, and area damage is dealt to all enemies within range. Camera shake is applied during the stomp.", "vfx": "Ground Impact VFX, Particle Burst, Camera Shake", "sfx": "Short tense wind-up rumble, body-weight stomp thud, explosive ground crack, dust burst, low camera-shake boom tail."}, {"title": "GutsDemon", "description": "A demon model is summoned and follows the player. When an enemy is detected within range, the demon stops following and attacks using either Thrash or Consumption chosen at random. The demon remains active while its attribute is true.", "vfx": "Demon Model Spawn, Follow Animation, Attack Animations (Thrash/Consumption), Despawn", "sfx": "Dark summon roar, heavy demon footfalls or breathing loop, brutal thrash swipes, deep consumption growl, smoky despawn collapse."}, {"title": "Heatray", "description": "A heat ray part spawns in front of the player on the ground and moves forward in the player look direction. It continuously deals area damage at a fast tick rate while moving. After its lifespan, it disables visual effects, waits, and is destroyed.", "vfx": "Heat Ray Part Model, Ground Spawn, Forward Movement, Continuous Damage VFX, Disable/Destroy", "sfx": "Scorching ground ignition, sustained heat-beam sizzle, moving burn crackle, damage tick hiss, abrupt emitter shutoff with cooling metal fade."}, {"title": "HomingFlames", "description": "Multiple fire projectiles spawn from the player head with staggered delays. Each initially flies forward, then after a brief delay begins homing toward the nearest enemy using lerp-based turning. On raycast hit, each explodes dealing damage. 10-second timeout per projectile.", "vfx": "Fire Projectile Models, Staggered Spawn From Head, Homing Trail, Explosion Burst", "sfx": "Staggered fire spit launches, small flame missiles whooshing forward, pitch-bent homing turn sounds, compact fire impacts, fizzle-out if a projectile times out."}, {"title": "HolyNova", "description": "A part with particle emitters is welded to the player. Over multiple segments, it deals area damage to enemies and area healing to players within range at each interval. After all segments complete, particles are disabled and the clone is destroyed.", "vfx": "Part With Particle Emitters, Welded To Player, Particle Emission During Segments, Disable/Destroy", "sfx": "Warm holy activation tone, pulsing radiant chimes per segment, soft heal shimmer, sharper damage sparkle for enemies, calm fade when emitters disable."}, {"title": "IceShards", "description": "Detects nearby enemies and fires ice shards at them one at a time. Each shard flies toward its target, and on hit deals damage and applies a slowness effect. Shards embed into the enemy, then fade out after a lifetime.", "vfx": "Shard Model Spawn, Flight Trail, Embed Visual, Fade Out", "sfx": "Repeated ice shard conjure ticks, sharp frozen launch whistles, crisp embed cracks on hit, cold slow-effect shimmer, glassy fade-out."}, {"title": "IceSpear", "description": "During charge, 1 to 3 ice spears fade in floating above the player. On release, all spears home toward the nearest enemy at high speed. On hit, each spear deals damage scaled by spear count and plays an impact sound.", "vfx": "Spear Model Fade In, Float Idle, Homing Trail, Impact Burst", "sfx": "Icy spear materialization chime, suspended cold hum while charging, fast homing spear whistle, hard crystal impact burst, brief frost sparkle tail."}, {"title": "LightBeam", "description": "A continuous beam of light connects from the player to the mouse position via raycast. It deals damage-per-second to any enemy caught in the beam. The beam lasts for its lifetime, then is disabled and destroyed after a delay.", "vfx": "Beam Visual, Continuous Connection, Endpoint Glow", "sfx": "Clean light-beam ignition, steady radiant laser hum, subtle endpoint burn sparkle, damage tick shimmer, instant beam cutoff with a bright fade."}, {"title": "LightSlash", "description": "After an attack delay, a slash VFX spawns in front of the player and moves forward over time. It emits a slash particle on spawn and continuously checks for enemy overlap during its forward movement, dealing damage to each enemy once. The clone is destroyed after the moving time.", "vfx": "Slash VFX Clone, Forward Movement Tween, Slash Particle Emission, Destroy After Move", "sfx": "Brief attack wind-up, bright blade draw sound, clean forward light-slice whoosh, sparkling hit accent, quick dissolve shimmer after movement ends."}, {"title": "MagicHeal", "description": "Healing VFX spawns on the ground beneath the player. After a 4-second wait, the caster is healed for a self-heal amount, and all other players within range are healed for a reduced amount. VFX are then destroyed.", "vfx": "Ground Healing VFX, Particle Emission, Fade Out", "sfx": "Soft magical circle appear, gentle healing particle loop, warm heal confirmation chime after delay, faint restorative sparkle, peaceful fade-out."}, {"title": "MagneticCrush", "description": "A magnetic field spawns at the target position and pulls nearby enemies toward its center using constant pull strength. It deals area damage to all enemies within its radius over time. The field persists for its duration, then disappears.", "vfx": "Magnetic Field VFX, Target Position Spawn, Pull Visual On Enemies, Area Damage Particles, Disappear", "sfx": "Magnetic field pulse on spawn, metal-stress hum, increasing pull vibration, crushing pressure ticks, distorted implosion fade when the field disappears."}, {"title": "ManaBurst", "description": "A mana explosion VFX appears at the player position, applying slowness. Damage is dealt in expanding concentric rings with falloff, where inner rings deal full damage and outer rings deal reduced damage, spread over time.", "vfx": "Explosion VFX, Expanding Ring Particles", "sfx": "Central mana detonation, expanding ring whooshes timed to each wave, lower thumps for inner rings, lighter outer pulses, magical residue fade."}, {"title": "ManaRipple", "description": "A projectile spawns at the player and moves forward toward the mouse with a sine wave vertical oscillation. On raycast hit with an enemy, it deals damage and destroys itself. No ambient or looping phase; it is a single fast projectile.", "vfx": "Projectile Model, Sine Wave Oscillation, Flight Trail, Hit Destroy", "sfx": "Watery-magic projectile pop, wavering oscillation tone, smooth flight trail shimmer, small mana hit splash, instant vanish click."}, {"title": "ManaSlam", "description": "A large model spawns above and behind the player and grows during charge. On release, it falls toward the ground with increasing speed. On impact, it deals area damage and applies knockback toward the slam position, then waits and is destroyed.", "vfx": "Large Model Spawn, Growth Tween, Fall Animation, Impact VFX, Disappear", "sfx": "Large mana construct forming hum, heavy growth swell, descending magical weight rush, powerful slam explosion, lingering low-energy collapse."}, {"title": "PhaseShift", "description": "The player is slowed, takes self-damage, and then is instantly teleported to the mouse raycast position. No projectile or ambient phase; this is an instant-cast ability with a slowness recovery period after teleporting.", "vfx": "Teleport Out VFX, Teleport In VFX, Slowness Visual", "sfx": "Short unstable phase charge, sharp teleport-out blink, split-second void silence, teleport-in snap, muffled recovery shimmer while slowed."}, {"title": "PiercingVoid", "description": "A void projectile spawns at the player head and travels toward the mouse. It pierces through enemies, dealing damage and applying slowness on each hit. It continues until it reaches max pierce count or its lifetime, then fades out over 0.2 seconds.", "vfx": "Void Projectile Model, Pierce Trail, Slowness Visual On Hit, Fade Out", "sfx": "Deep void launch pulse, hollow projectile drone, slicing pierce sounds on each enemy, slow-effect dark shimmer, quick vacuum fade-out."}, {"title": "PoisonMushroom", "description": "A mushroom model spawns at the mouse position and fades in over 0.2 seconds. It has poison damage mechanics including spawn damage, tick damage over time, and a poison radius. The mushroom persists for its duration before disappearing.", "vfx": "Mushroom Model, Fade In, Poison Aura Particles, Persistent Idle", "sfx": "Wet mushroom pop from ground, toxic gas hiss, bubbling poison aura loop, soft damage tick splats, damp vanish puff."}, {"title": "PoisonSplash", "description": "A poison bottle is thrown from the player arm toward the mouse in a parabolic arc with gravity. On impact, the bottle breaks and a poison puddle grows on the ground, dealing tick damage every 0.5 seconds for 4 seconds before fading out.", "vfx": "Bottle Model, Parabolic Arc Throw, Break VFX On Impact, Poison Puddle Growth, Tick Damage Particles, Fade Out", "sfx": "Glass bottle throw whoosh, arcing liquid slosh, sharp bottle shatter, spreading toxic puddle splash, bubbling tick loop, acidic fade-out hiss."}, {"title": "RazorRain", "description": "Blades spawn high above the targeted area and rain down on enemies. Each blade falls from the sky toward the ground, dealing damage to enemies it hits. The blades persist for a duration before fading out and being destroyed.", "vfx": "Blade Models Spawn High, Fall From Sky, Downward Flight Trail, Ground Impact, Fade Out", "sfx": "High metallic summon glints, many falling blade whistles, repeated sharp ground/enemy impacts, brief steel rattles, airy fade as blades dissolve."}, {"title": "SeismicSlam", "description": "The player leaps forward and upward, then slams down with force. On landing, a neon shockwave expands outward, dealing area damage, applying slowness, and knocking back enemies. Particle burst and camera shake accompany the impact. The shockwave expands then is destroyed.", "vfx": "Leap Animation, Slam Down Animation, Neon Shockwave Model, Expanding Shockwave Tween, Particle Burst, Camera Shake, Destroy", "sfx": "Leap launch grunt/whoosh, falling body rush, huge slam boom, expanding seismic shockwave bass, particles crackle, final ground resonance tail."}, {"title": "ShadowLantern", "description": "A lantern spawns above and follows the player, creating a slowing zone around it. Enemies within the zone get progressively slower the longer they stay, scaling up to a max slowness. When enemies leave the zone, their slowness is removed. Lasts for total duration then is destroyed.", "vfx": "Lantern Model Spawn, Follow Player Above, Slowing Zone Visual, Enemy Slowness Indicator, Destroy", "sfx": "Ghostly lantern ignite, low hanging chain creak, dark aura drone, intensifying slow-effect whispers around enemies, soft extinguish when destroyed."}, {"title": "SpiritWolf", "description": "A wolf model spawns behind the player and fades in over a summon time. It wanders behind the player until an enemy is detected, then approaches and attacks with 2-3 hits per target. After attacking, it retreats briefly before seeking a new target. Fades out at end of lifetime.", "vfx": "Wolf Model Spawn, Fade In, Wander/Follow Animation, Attack Animation, Retreat Animation, Fade Out", "sfx": "Spirit howl on summon, soft spectral paw steps, low growl while tracking, quick bite/claw hits, retreat pant, fading ghost howl at despawn."}, {"title": "TidalPush", "description": "A wave part spawns in front of the player, rises up during a raise duration, then travels forward at wave speed. Enemies within detection radius are hit once with knockback and damage. The wave then sinks and fades during a sink duration before being destroyed.", "vfx": "Wave Part Model, Rise Animation, Forward Travel, Sink/Fade, Destroy", "sfx": "Water surge rising, rolling wave travel loop, heavy splash hits with knockback, receding water sink, soft foam fade."}, {"title": "Tsunami", "description": "Two waves spawn on the left and right of the player, rise from underground while moving inward, and grab enemies with touch damage. The waves then crash together dealing collapse damage, followed by sinking and fading. Camera shake is applied during raise and collapse phases.", "vfx": "Two Wave Models, Underground Rise, Inward Movement, Crash Together, Sink/Fade, Camera Shake", "sfx": "Deep ocean rumble, two massive waves rising, inward rushing water walls, huge collision crash, camera-shake bass, draining water fade."}, {"title": "WaterSplash", "description": "A water projectile is thrown toward the mouse with downward gravity. It travels up to 500 studs. On impact, it destroys itself and deals splash damage to all enemies within a range and horizontal cone angle from the impact point.", "vfx": "Water Projectile Model, Parabolic Arc, Splash Burst VFX", "sfx": "Water projectile throw splash, airy liquid arc whoosh, wet impact burst, short droplets scatter, quick puddle-like fade."}, {"title": "Whirlwind", "description": "A vortex spawns in front of the player and moves randomly in changing directions. It continuously pulls nearby enemies inward and deals damage over time. The whirlwind persists for its lifetime, then its visual effects are disabled and it is destroyed.", "vfx": "Vortex Model Spawn, Random Movement, Pull Visual, Disable/Destroy", "sfx": "Vortex spawn gust, continuous rotating wind loop, shifting direction whooshes, suction pull accents, debris swirl, wind drops out when disabled."}];

function clearBody() {
  document.body.innerHTML = "";
  document.body.setAttribute("bgcolor", "#c8c8c8");
}

function add(tag, text, href, onclick) {
  const el = document.createElement(tag);
  el.textContent = text;
  if (href !== undefined) el.href = href;
  if (onclick !== undefined) el.onclick = onclick;
  document.body.appendChild(el);
  return el;
}

function showList() {
  clearBody();
  add("h1", "Abilities");
  add("p1", "NOTE: I used AI for the ability descriptions and this site, but I checked and all seems fine. Also link/url is long since it's free. Important: On the VFX and SFX sections you don't have to do everything there half/some of it is on the scripting part. I think you can understand what is required and if not ask me (Mark)")

  let currentLetter = "";
  let currentP = null;

  abilities.forEach((ability, index) => {
    const letter = ability.title.charAt(0).toUpperCase();

    if (letter !== currentLetter) {
      currentLetter = letter;
      currentP = document.createElement("p");
      document.body.appendChild(currentP);
    }

    const link = document.createElement("a");
    link.textContent = ability.title;
    link.href = "#";
    link.onclick = function(event) {
      event.preventDefault();
      showAbility(index);
    };

    if (currentP.childNodes.length > 0) {
      currentP.appendChild(document.createTextNode(" "));
    }

    currentP.appendChild(link);
  });
}

function showAbility(index) {
  const ability = abilities[index];
  clearBody();

  add("a", "Back", "#", function(event) {
    event.preventDefault();
    showList();
  });

  add("h1", ability.title);
  add("p", ability.description);
  add("h2", "VFX");
  add("p", ability.vfx);
  add("h2", "SFX");
  add("p", ability.sfx);
}

showList();
</script>
</body>
</html>
